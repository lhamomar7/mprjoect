<script>
function createProductCard(product) {
  const isWished = wishlist.includes(product.id);

  return `
    <div class="product-card">
      <div class="product-img">
        <div class="img-placeholder">${product.emoji}</div>

        ${product.badge ? `<span class="product-badge${product.badge === 'מבצע' || product.badge === 'عرض' ? ' sale' : ''}">${product.badge}</span>` : ''}

        <button class="product-wish${isWished ? ' active' : ''}" data-id="${product.id}" onclick="toggleWishlist(${product.id}); updateWishlistUI();">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
      </div>

      <div class="product-info">
        <div class="product-brand">${product.brand}</div>
        <div class="product-name">${product.name}</div>

        <div class="product-bottom">
          <div class="product-price">
            ${product.oldPrice ? `<span class="old-price">₪${product.oldPrice.toLocaleString()}</span>` : ''}
            ₪${product.price.toLocaleString()}
          </div>

          <button class="add-to-cart" onclick="addToCart(${product.id})">أضيفي +</button>
        </div>
      </div>
    </div>`;
}

let currentFilter = 'all';
let currentSort = 'default';

function renderShop() {
  let filtered = currentFilter === 'all'
    ? [...PRODUCTS]
    : PRODUCTS.filter(p => p.category === currentFilter);

  if (currentSort === 'price-asc') {
    filtered.sort((a,b) => a.price - b.price);
  } else if (currentSort === 'price-desc') {
    filtered.sort((a,b) => b.price - a.price);
  } else if (currentSort === 'new') {
    filtered.sort((a,b) => b.isNew - a.isNew);
  } else if (currentSort === 'sale') {
    filtered.sort((a,b) => (b.badge === 'מבצע' || b.badge === 'عرض') - (a.badge === 'מבצע' || a.badge === 'عرض'));
  }

  document.getElementById('shopGrid').innerHTML = filtered.map(createProductCard).join('');
  document.getElementById('resultCount').textContent = `${filtered.length} منتجات متوفرة`;
  document.getElementById('resultCount2').textContent = `${filtered.length} منتجات`;

  updateWishlistUI();
}

document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const cat = params.get('cat');

  if (cat) {
    currentFilter = cat;

    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === cat);
    });
  }

  renderShop();

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));

      btn.classList.add('active');
      currentFilter = btn.dataset.filter;

      renderShop();
    });
  });

  document.getElementById('sortSelect').addEventListener('change', e => {
    currentSort = e.target.value;
    renderShop();
  });
});
</script>
